name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'jit-bot/package-lock.json'
    
    - name: Install dependencies
      run: |
        cd jit-bot
        npm ci
    
    - name: Run linter
      run: |
        cd jit-bot
        npm run lint
    
    - name: Run tests
      run: |
        cd jit-bot
        npm test
    
    - name: Build project
      run: |
        cd jit-bot
        npm run build
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.node-version }}
        path: jit-bot/coverage/

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'jit-bot/package-lock.json'
    
    - name: Install dependencies
      run: |
        cd jit-bot
        npm ci
    
    - name: Run security audit
      run: |
        cd jit-bot
        npm audit --audit-level=moderate
    
    - name: Run dependency check
      run: |
        cd jit-bot
        npx audit-ci --moderate

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'jit-bot/package-lock.json'
    
    - name: Install dependencies
      run: |
        cd jit-bot
        npm ci
    
    - name: Build for production
      run: |
        cd jit-bot
        npm run build
    
    - name: Create deployment artifact
      run: |
        cd jit-bot
        tar -czf ../jit-bot-${{ github.sha }}.tar.gz dist/ package.json package-lock.json
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v3
      with:
        name: jit-bot-build-${{ github.sha }}
        path: jit-bot-${{ github.sha }}.tar.gz
        retention-days: 30